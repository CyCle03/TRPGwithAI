<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI GM 던전 월드</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 캐릭터 생성 화면 (시트 만들기 3단계) -->
    <div id="setup" class="setup hidden">
      <div class="setup-card">
        <h1>🎲 AI GM 솔로 던전 월드</h1>
        <p class="subtitle">캐릭터 시트를 만들어 모험을 시작하세요</p>

        <div class="steps">
          <span class="step active" data-step="1">1 · 클래스</span>
          <span class="step" data-step="2">2 · 능력치</span>
          <span class="step" data-step="3">3 · 소개</span>
        </div>

        <!-- Step 1: 클래스 -->
        <div class="step-panel" data-panel="1">
          <label>클래스 선택</label>
          <div id="classList" class="class-list"></div>
        </div>

        <!-- Step 2: 능력치 -->
        <div class="step-panel hidden" data-panel="2">
          <label>능력치 배분</label>
          <div class="stat-mode">
            <button type="button" id="modeRecommend" class="toggle active">추천 배치</button>
            <button type="button" id="modeCustom" class="toggle">직접 배분</button>
          </div>
          <p class="hint" id="statHint"></p>
          <div id="statAssign" class="stat-assign"></div>
        </div>

        <!-- Step 3: 소개 -->
        <div class="step-panel hidden" data-panel="3">
          <label>캐릭터 이름</label>
          <input id="charName" type="text" placeholder="예: 아린" maxlength="40" />
          <label>한 줄 소개 <span class="opt">(선택)</span></label>
          <input
            id="charLook"
            type="text"
            placeholder="예: 상처투성이 갑옷을 걸친 과묵한 용병"
            maxlength="200"
          />
          <p class="hint">외형·성격·배경을 적으면 GM이 첫 장면에 반영합니다.</p>
          <div id="sheetSummary" class="sheet-summary"></div>
        </div>

        <div class="wizard-nav">
          <button type="button" id="prevBtn" class="ghost hidden">이전</button>
          <button type="button" id="nextBtn" class="primary">다음</button>
          <button type="button" id="startBtn" class="primary hidden">모험 시작</button>
        </div>
      </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game" class="game hidden">
      <main class="log-pane">
        <header class="log-header">
          <span>🎲 던전 월드</span>
          <button id="newGameBtn" class="ghost" title="새 게임">새 게임</button>
        </header>
        <div id="log" class="log"></div>
        <div id="thinking" class="thinking hidden">GM이 이야기를 짜는 중…</div>
        <div id="suggestions" class="suggestions hidden"></div>
        <form id="inputForm" class="input-bar">
          <button type="button" class="ghost suggest-btn" id="suggestBtn" title="행동 제안 받기">
            💡 제안
          </button>
          <input
            id="actionInput"
            type="text"
            placeholder="행동을 서술하세요. 예: 고블린 뒤로 몰래 다가간다"
            autocomplete="off"
          />
          <button type="submit" class="primary" id="sendBtn">전송</button>
        </form>
      </main>

      <aside class="status-pane">
        <h2 id="charTitle">캐릭터</h2>

        <div class="level-row">
          <span class="level-badge">Lv <span id="levelText">1</span></span>
          <div class="xp-wrap">
            <div class="xp-label">XP <span id="xpText">0/8</span></div>
            <div class="xp-bar-outer"><div id="xpBar" class="xp-bar-inner"></div></div>
          </div>
        </div>

        <div class="hp-block">
          <div class="hp-label">
            HP <span id="hpText">–/–</span>
          </div>
          <div class="hp-bar-outer">
            <div id="hpBar" class="hp-bar-inner"></div>
          </div>
          <div class="armor" id="armorText">방어구 0</div>
        </div>

        <h3>능력치</h3>
        <div id="stats" class="stats-grid"></div>

        <h3>인벤토리</h3>
        <ul id="inventory" class="inventory"></ul>

        <h3>습득 무브</h3>
        <ul id="moves" class="moves"></ul>

        <div class="model-note" id="modelNote"></div>
      </aside>
    </div>

    <!-- 레벨업 선택 모달 -->
    <div id="levelupModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h2>⭐ 레벨업!</h2>
        <p class="modal-sub">성장 방향을 선택하세요.</p>

        <h3>능력치 +1</h3>
        <div id="luStats" class="lu-stats"></div>

        <h3>새 무브 습득</h3>
        <div id="luMoves" class="lu-moves"></div>

        <button id="luConfirm" class="primary" disabled>선택 확정</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
